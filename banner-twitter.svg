<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d150b"/>
      <stop offset="100%" stop-color="#162012"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab86a" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8ab86a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ab86a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8ab86a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1a2a16" stroke-width="0.5" opacity="0.35">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="375" y1="0" x2="375" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="1125" y1="0" x2="1125" y2="500"/>
  </g>

  <!-- Chart fill -->
  <path d="M0,420 C100,410 180,390 280,370 C380,345 440,360 540,340 C620,320 680,290 780,260 C860,240 920,255 1000,230 C1080,210 1140,180 1220,155 C1300,135 1380,120 1500,95 L1500,500 L0,500 Z" fill="url(#chartFill)"/>

  <!-- Chart line -->
  <path d="M0,420 C100,410 180,390 280,370 C380,345 440,360 540,340 C620,320 680,290 780,260 C860,240 920,255 1000,230 C1080,210 1140,180 1220,155 C1300,135 1380,120 1500,95" fill="none" stroke="url(#chartLine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Chart glow -->
  <path d="M0,420 C100,410 180,390 280,370 C380,345 440,360 540,340 C620,320 680,290 780,260 C860,240 920,255 1000,230 C1080,210 1140,180 1220,155 C1300,135 1380,120 1500,95" fill="none" stroke="#4ade80" stroke-width="6" opacity="0.08" stroke-linecap="round"/>

  <!-- Left: Logo icon -->
  <rect x="80" y="160" width="76" height="76" rx="19" fill="#8ab86a"/>
  <polyline points="100,210 114,192 128,202 146,180" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="146" cy="180" r="4.5" fill="white"/>

  <!-- Left: Logo text -->
  <text x="174" y="213" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#f0ead0" letter-spacing="-1">Green<tspan fill="#8ab86a">line</tspan></text>

  <!-- Left: Divider -->
  <line x1="80" y1="268" x2="420" y2="268" stroke="#2a3a26" stroke-width="1"/>

  <!-- Left: Tagline -->
  <text x="80" y="305" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="300" fill="#f0ead0" opacity="0.85">Live Market News &amp; Stock Tracker</text>

  <!-- Left: Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="500">
    <rect x="80" y="335" width="100" height="30" rx="15" fill="#1a2a16" stroke="#2a3a26" stroke-width="1"/>
    <text x="102" y="355" fill="#8ab86a">Real-time</text>

    <rect x="192" y="335" width="110" height="30" rx="15" fill="#1a2a16" stroke="#2a3a26" stroke-width="1"/>
    <text x="211" y="355" fill="#8ab86a">AI Insights</text>

    <rect x="314" y="335" width="110" height="30" rx="15" fill="#1a2a16" stroke="#2a3a26" stroke-width="1"/>
    <text x="333" y="355" fill="#8ab86a">Watchlists</text>
  </g>

  <!-- Right: URL -->
  <text x="1420" y="440" text-anchor="end" font-family="ui-monospace, 'SF Mono', monospace" font-size="15" font-weight="400" fill="#3a5434" letter-spacing="0.5">greenlinenews.com</text>

  <!-- Endpoint dot -->
  <circle cx="1460" cy="100" r="5" fill="#4ade80"/>
  <circle cx="1460" cy="100" r="10" fill="#4ade80" opacity="0.15"/>

  <!-- Top/bottom border accents -->
  <rect x="0" y="0" width="1500" height="2" fill="#1a2a16"/>
  <rect x="0" y="498" width="1500" height="2" fill="#1a2a16"/>
</svg>

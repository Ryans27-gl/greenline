<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list — Greenline</title>
<meta name="theme-color" content="#111a0f">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sora', sans-serif;
  background: #111a0f; color: #f0ead0;
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; padding: 24px;
}
.success-card {
  background: #faf6ee; border-radius: 24px;
  max-width: 440px; width: 100%; padding: 48px 32px;
  text-align: center; color: #1e1a10;
}
.success-icon { font-size: 48px; margin-bottom: 16px; }
.success-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
.success-sub { font-size: 14px; color: #5a5040; line-height: 1.7; font-weight: 300; margin-bottom: 28px; }
.success-btn {
  display: inline-block; padding: 16px 32px; border-radius: 14px;
  background: #6a9e52; color: #fff; text-decoration: none;
  font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700;
  transition: opacity 0.15s;
}
.success-btn:hover { opacity: 0.88; }
</style>
</head>
<body>
<div class="success-card">
  <div class="success-icon">&#10003;</div>
  <div class="success-title">You're on the list!</div>
  <div class="success-sub">We'll send you our weekly market recap every Sunday morning. No spam, just the news that matters.</div>
  <a class="success-btn" href="/">Back to Greenline</a>
</div>
</body>
</html>

[build]
  functions = "netlify/functions"

# SECURITY HEADERS for all pages
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.jsdelivr.net https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.adtrafficquality.google https://*.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://api.anthropic.com https://finnhub.io https://api.rss2json.com https://www.google-analytics.com https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.doubleclick.net; frame-src https://*.googlesyndication.com https://*.doubleclick.net https://*.google.com; frame-ancestors 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Redirect old legal paths to new /legal/ folder
[[redirects]]
  from = "/privacy-policy.html"
  to = "/legal/privacy-policy.html"
  status = 301

[[redirects]]
  from = "/terms-of-service.html"
  to = "/legal/terms-of-service.html"
  status = 301

[[redirects]]
  from = "/disclaimer.html"
  to = "/legal/disclaimer.html"
  status = 301

[[redirects]]
  from = "/nda.html"
  to = "/legal/nda.html"
  status = 301

[[redirects]]
  from = "/contractor-agreement.html"
  to = "/legal/contractor-agreement.html"
  status = 301

# Redirect old brand asset paths
[[redirects]]
  from = "/og-image.svg"
  to = "/brand/social/og-image.svg"
  status = 301

[[redirects]]
  from = "/brand/og-image.svg"
  to = "/brand/social/og-image.svg"
  status = 301

[[redirects]]
  from = "/brand/logo-square.svg"
  to = "/brand/logos/logo-square.svg"
  status = 301

[[redirects]]
  from = "/icons/icon-192.png"
  to = "/brand/favicon/favicon-192.png"
  status = 301

[[redirects]]
  from = "/icons/icon-512.png"
  to = "/brand/favicon/favicon-512.png"
  status = 301

# 404 fallback — serves 404.html for unknown paths
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

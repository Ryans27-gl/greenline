<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d150b"/>
      <stop offset="100%" stop-color="#162012"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ab86a" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#8ab86a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ab86a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8ab86a" stop-opacity="0"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
      <path d="M0,1 L10,5 L0,9 Z" fill="#f0ead0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2a16" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Chart area fill -->
  <path d="M0,520 C80,510 140,490 200,470 C280,440 340,460 420,430 C480,410 520,380 580,350 C640,320 700,340 760,310 C820,280 860,250 920,220 C960,200 1020,180 1060,150 C1100,130 1140,120 1200,100 L1200,630 L0,630 Z" fill="url(#chartFill)"/>

  <!-- Chart line -->
  <path d="M0,520 C80,510 140,490 200,470 C280,440 340,460 420,430 C480,410 520,380 580,350 C640,320 700,340 760,310 C820,280 860,250 920,220 C960,200 1020,180 1060,150 C1100,130 1140,120 1200,100" fill="none" stroke="url(#chartLine)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow on chart line -->
  <path d="M0,520 C80,510 140,490 200,470 C280,440 340,460 420,430 C480,410 520,380 580,350 C640,320 700,340 760,310 C820,280 860,250 920,220 C960,200 1020,180 1060,150 C1100,130 1140,120 1200,100" fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.12"/>

  <!-- Dot at chart end -->
  <circle cx="1160" cy="110" r="6" fill="#4ade80"/>
  <circle cx="1160" cy="110" r="12" fill="#4ade80" opacity="0.2"/>

  <!-- Centered pill logo -->
  <rect x="310" y="200" width="580" height="98" rx="49" fill="#111a0f" stroke="rgba(138,184,106,0.15)" stroke-width="1"/>
  <!-- Icon square inside pill -->
  <rect x="322" y="212" width="74" height="74" rx="13" fill="#6a9e52"/>
  <!-- Chart arrow in icon -->
  <polyline points="336,270 352,253 361,259 381,226" fill="none" stroke="#f0ead0" stroke-width="4" stroke-linecap="butt" stroke-linejoin="round" marker-end="url(#arr)"/>
  <!-- Text: greenlinenews.com -->
  <text x="414" y="262" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700">
    <tspan fill="#7a9470">green</tspan><tspan fill="#f0ead0">linenews.com</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="300" fill="#f0ead0" opacity="0.8">Live Market News &amp; Stock Tracker</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500">
    <rect x="330" y="380" width="130" height="36" rx="18" fill="#1a2a16" stroke="#2a3a26" stroke-width="1"/>
    <text x="362" y="403" fill="#8ab86a">Real-time</text>
    <rect x="474" y="380" width="140" height="36" rx="18" fill="#1a2a16" stroke="#2a3a26" stroke-width="1"/>
    <text x="501" y="403" fill="#8ab86a">AI Insights</text>
    <rect x="628" y="380" width="140" height="36" rx="18" fill="#1a2a16" stroke="#2a3a26" stroke-width="1"/>
    <text x="655" y="403" fill="#8ab86a">Watchlists</text>
  </g>

  <!-- Border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1a2a16" stroke-width="2"/>
</svg>

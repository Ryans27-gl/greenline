<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,1.5 L10,5 L0,8.5 Z" fill="#f0ead0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="#111a0f"/>

  <!-- Centered headline -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="78" font-weight="700" fill="#f0ead0" letter-spacing="-2">Learn how to invest.</text>

  <!-- Subline -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="300" fill="#7a9470">Simple, beginner-friendly market news.</text>

  <!-- Pill logo centered at bottom -->
  <g transform="translate(370, 460)">
    <rect width="460" height="76" rx="38" fill="#0d150b" stroke="rgba(138,184,106,0.2)" stroke-width="1"/>
    <rect x="9" y="9" width="58" height="58" rx="13" fill="#6a9e52"/>
    <polyline points="19,53 31,38 38,44 58,18" fill="none" stroke="#f0ead0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arr)"/>
    <text x="82" y="48" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="32" font-weight="700">
      <tspan fill="#7a9470">green</tspan><tspan fill="#f0ead0">linenews.com</tspan>
    </text>
  </g>
</svg>
